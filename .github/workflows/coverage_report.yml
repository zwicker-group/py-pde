name: "Generate coverage report"

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'

jobs:
  coverage_report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup FFmpeg
      uses: AnimMouse/setup-ffmpeg@v1

    - name: Install dependencies
      # install all requirements. Note that the full requirements are installed separately
      # so the job does not fail if one of the packages cannot be installed. This allows
      # testing the package for newer python version even when some of the optional
      # packages are not yet available.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        cat tests/requirements_full.txt | sed -e '/^\s*#.*$/d' -e '/^\s*$/d' | xargs -n 1 -I % sh -c "pip install % || true"
        pip install -r tests/requirements.txt

    - name: Generate serial coverage report
      env:
        NUMBA_DISABLE_JIT: 1
        JAX_DISABLE_JIT: 1
        MPLBACKEND: agg
        PYPDE_TESTRUN: 1
      run: |
        export PYTHONPATH="${PYTHONPATH}:`pwd`"
        export COVERAGE_FILE=".coverage.serial"
        pytest -v -rP -o log_cli=true --cov-config=pyproject.toml --cov=pde -n auto tests 

    - name: Setup MPI
      uses: mpi4py/setup-mpi@v1
      with:
        mpi: "openmpi"

    - name: Generate parallel coverage report
      env:
        NUMBA_DISABLE_JIT: 1
        JAX_DISABLE_JIT: 1
        MPLBACKEND: agg
        PYPDE_TESTRUN: 1
      run: |
        export PYTHONPATH="${PYTHONPATH}:`pwd`"
        pip install -r tests/requirements_mpi.txt
        # mpiexec -n 2 pytest -v -rP -o log_cli=true --cov-config=pyproject.toml --cov=pde --use_mpi tests

        # run pytest under MPI, but avoid sharing cache/coverage state between ranks
        mpiexec -n 2 bash -lc '
          export COVERAGE_FILE=".coverage.mpi.${OMPI_COMM_WORLD_RANK:-0}"
          export TMPDIR="$(pwd)/.tmp_mpi_${OMPI_COMM_WORLD_RANK:-0}"
          mkdir -p "$TMPDIR"
          pytest -v -rP -o log_cli=true \
            --cov-config=pyproject.toml --cov=pde \
            -p no:cacheprovider \
            --use_mpi tests
        '

        # combine per-rank coverage data into the main file for the later "coverage xml"
        coverage combine .coverage.serial .coverage.mpi.*

    - name: Create coverage report
      run: |
        coverage xml -o coverage_report.xml 

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_report.xml
        flags: unittests
        name: codecov-pydev
        fail_ci_if_error: true
